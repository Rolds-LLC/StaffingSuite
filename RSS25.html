<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Siri Staffing Calculator Suite</title>
<style>
*{box-sizing:border-box} body{margin:0;background:#eef4f9;font-family:Inter,Segoe UI,Arial,sans-serif;color:#182433}
.shell{max-width:1280px;margin:22px auto;padding:0 14px}
.shell-head{background:#fff;border:1px solid #dbe5ee;border-radius:18px 18px 0 0;padding:16px 22px;display:grid;grid-template-columns:180px 1fr 180px;align-items:center;box-shadow:0 10px 30px rgba(20,55,90,.08)}
.shell-head img{width:170px;height:64px;object-fit:contain;display:block}
.title{text-align:center} .title h1{margin:0;color:#123d63;font-size:27px} .title p{margin:5px 0 0;color:#657487;font-weight:600}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#fff;padding:12px 22px 16px;border-left:1px solid #dbe5ee;border-right:1px solid #dbe5ee}
.tab{padding:15px;border:1px solid #dbe5ee;border-radius:11px;background:#f7fafc;color:#182433;font-weight:900;font-size:15px;cursor:pointer}
.tab.active{background:linear-gradient(135deg,#123d63,#1769aa);color:#fff;border-color:#123d63}
.frame-wrap{background:#fff;border:1px solid #dbe5ee;border-top:0;border-radius:0 0 18px 18px;overflow:hidden}
iframe{width:100%;border:0;display:block;min-height:1200px;background:#fff}
.hidden{display:none}
@media(max-width:700px){.shell-head{grid-template-columns:1fr;text-align:center}.shell-head img{margin:auto}.shell-head .spacer{display:none}.title h1{font-size:22px}.tabs{grid-template-columns:1fr}}

#rtrFrame{width:100%;border:0;display:block;min-height:1100px}
#rtrFrame.hidden{display:none!important}

/* Staffing Suite modern product polish */
:root{--suite-navy:#0b3b66;--suite-blue:#1478c9;--suite-soft:#eef6fc;--suite-green:#168a57;--suite-gold:#d99b22}
body{background:
 radial-gradient(circle at 8% 4%,rgba(20,120,201,.10),transparent 24%),
 radial-gradient(circle at 92% 10%,rgba(22,138,87,.08),transparent 22%),
 linear-gradient(180deg,#f7fbfe 0%,#eef4f8 100%)!important}
.hero,.header,.topbar{position:relative;overflow:hidden}
.hero:after,.header:after,.topbar:after{content:"";position:absolute;width:190px;height:190px;border-radius:50%;right:-70px;top:-105px;background:linear-gradient(135deg,rgba(20,120,201,.12),rgba(22,138,87,.08));pointer-events:none}
.app-tabs button,.tab-btn{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.app-tabs button:hover,.tab-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(11,59,102,.12)}
iframe{border-radius:18px!important;box-shadow:0 14px 36px rgba(11,59,102,.09)}
</style>
</head>

&lt;style&gt;
:root{
 --bg:#f3f7fb;--card:#fff;--text:#182433;--muted:#657487;--border:#dbe5ee;
 --navy:#123d63;--blue:#1769aa;--green:#16834b;--greenSoft:#edf9f2;
 --amber:#a96f00;--amberSoft:#fff7df;--red:#c93636;--redSoft:#fff0f0;
 --input:#f9fbfd;--shadow:0 14px 40px rgba(25,55,85,.10)
}
body.dark{
 --bg:#101820;--card:#18232d;--text:#edf4fa;--muted:#9fb0bf;--border:#334554;
 --navy:#7db7e5;--blue:#58a7e4;--input:#202e3a;--shadow:0 14px 40px rgba(0,0,0,.28)
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,var(--bg),#eaf1f7);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
body.dark{background:var(--bg)}
.wrap{max-width:1180px;margin:24px auto;padding:0 14px 36px}
.app{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:22px}
.header{position:relative;display:flex;align-items:center;justify-content:center;min-height:76px;border-bottom:1px solid var(--border);padding-bottom:16px}
.brand{text-align:center}
.brand h1{margin:0;color:var(--navy);font-size:27px}
.brand p{margin:6px 0 0;color:var(--muted);font-weight:600}
.logo{position:absolute;left:0;font-weight:900;font-size:25px;color:var(--navy);letter-spacing:.04em}
.theme{position:absolute;right:0;border:1px solid var(--border);background:var(--input);color:var(--text);padding:9px 12px;border-radius:9px;cursor:pointer;font-weight:700}
.mode-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:18px 0}
.mode-tab{border:1px solid var(--border);background:var(--input);color:var(--text);padding:13px;border-radius:10px;font-weight:800;cursor:pointer}
.mode-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.section{margin-top:16px;padding:18px;border:1px solid var(--border);border-radius:15px;background:linear-gradient(135deg,var(--input),var(--card))}
.eyebrow{font-size:10px;font-weight:900;letter-spacing:.13em;color:var(--blue);margin-bottom:6px}
h2{margin:0 0 5px;color:var(--navy);font-size:21px}
.helper{color:var(--muted);font-size:13px;line-height:1.5}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-top:15px}
.field label{display:block;font-size:12px;font-weight:800;margin-bottom:6px;color:var(--text)}
.field input,.field select{width:100%;padding:11px;border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font-size:15px}
.field small{display:block;color:var(--muted);font-size:10px;margin-top:5px;line-height:1.35}
.fixed-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
.fixed{flex:1;min-width:145px;padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:var(--card);display:flex;justify-content:space-between;align-items:center}
.fixed span{font-size:10px;color:var(--muted);font-weight:700}.fixed strong{font-size:14px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:13px 0}
.btn{border:0;padding:12px;border-radius:9px;font-weight:800;cursor:pointer}
.reset{background:var(--navy);color:#fff}.print{background:var(--blue);color:#fff}
.auto{text-align:center;color:var(--muted);font-size:12px;font-weight:700;margin-top:12px}
.decision{margin:16px 0 0;padding:18px;border:2px solid var(--border);border-radius:13px;text-align:center;font-size:22px;font-weight:900}
.decision small{display:block;font-size:14px;margin-top:6px}
.good{background:var(--greenSoft);border-color:var(--green);color:var(--green)}
.warn{background:var(--amberSoft);border-color:var(--amber);color:#795300}
.stop{background:var(--redSoft);border-color:var(--red);color:var(--red)}
.warning{display:none;margin-top:10px;padding:13px;border-radius:10px;background:var(--redSoft);border:1px solid var(--red);color:var(--red);font-weight:800}
.results{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}
.metric{padding:14px;border:1px solid var(--border);border-radius:11px;background:var(--card)}
.metric span{display:block;color:var(--muted);font-size:10px;font-weight:800}.metric strong{display:block;font-size:21px;margin-top:7px}
.metric.hero{border:2px solid var(--green);background:var(--greenSoft)}.metric.hero strong{font-size:28px;color:var(--green)}
.pitch{white-space:pre-line;line-height:1.7;padding:16px;border:1px solid var(--border);border-radius:11px;background:var(--card)}
.copy{margin-top:10px;background:var(--blue);color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:800;cursor:pointer}
details{margin-top:15px;border:1px solid var(--border);border-radius:12px;background:var(--input);overflow:hidden}
summary{padding:15px;font-weight:900;color:var(--navy);cursor:pointer}
.details{padding:0 15px 15px}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
.hidden{display:none!important}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:20px;z-index:50}
.modal.show{display:flex}.modal-card{width:min(620px,96vw);background:var(--card);padding:22px;border-radius:16px}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.results{grid-template-columns:repeat(3,1fr)}}
@media(max-width:620px){.header{padding-top:60px}.logo{top:5px}.theme{top:5px}.brand h1{font-size:21px}.mode-tabs{grid-template-columns:repeat(2,1fr)}.grid,.results{grid-template-columns:1fr}.actions{grid-template-columns:1fr 1fr}}
@media print{body{background:#fff}.theme,.actions,.auto,.mode-tabs,.copy{display:none!important}.app{box-shadow:none;border:0}.section,details{break-inside:avoid}details{display:block}details&gt;summary{display:none}.details{display:block!important}}

.business-tabs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0 12px}
.business-tab{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;border:1px solid var(--border);border-radius:13px;background:var(--input);color:var(--text);cursor:pointer;text-align:left;transition:.2s}
.business-tab:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(20,60,100,.08)}
.business-tab.active{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-color:var(--navy)}
.business-tab b{display:block;font-size:16px}.business-tab small{display:block;margin-top:4px;opacity:.8;font-size:11px}
.tab-icon{font-size:25px}
.employment-selector{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 14px;margin:0 auto 14px;border:1px solid var(--border);border-radius:11px;background:var(--input);width:max-content;max-width:100%}
.selector-label{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.employment-buttons{display:flex;gap:6px}
.employment-btn{padding:8px 18px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-weight:800;cursor:pointer}
.employment-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
@media(max-width:620px){
 .business-tabs{grid-template-columns:1fr}
 .employment-selector{width:100%;flex-direction:column}
 .employment-buttons{width:100%}.employment-btn{flex:1}
}

.company-logo{width:150px;height:58px;object-fit:contain;object-position:left center;font-size:0!important;letter-spacing:0!important}
@media(max-width:620px){.company-logo{width:125px;height:48px}}

.metric small{display:block;color:var(--muted);font-size:10px;margin-top:5px;line-height:1.3}

.rtr-intro{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 12px}
.rtr-details-grid{margin-top:0!important;margin-bottom:14px}
@media(max-width:620px){.rtr-details-grid{grid-template-columns:1fr!important}}

.primary-entry-heading{
 grid-column:1/-1;
 text-align:center;
 padding:4px 0 2px;
}
.primary-entry-heading h3{
 margin:2px 0 5px;
 color:var(--navy);
 font-size:21px;
}
.primary-entry-heading p{
 margin:0 auto 8px;
 color:var(--muted);
 font-size:12px;
}
.recruiter-input-grid{
 grid-template-columns:repeat(2,minmax(0,1fr))!important;
}
.primary-rate-field{
 padding:17px;
 border:2px solid var(--blue);
 border-radius:13px;
 background:linear-gradient(135deg,#eef7ff,#ffffff);
 box-shadow:0 7px 20px rgba(23,105,170,.10);
}
body.dark .primary-rate-field{background:#203240}
.primary-rate-field label{
 color:var(--navy)!important;
 font-size:14px!important;
}
.primary-rate-field input{
 font-size:24px!important;
 font-weight:900!important;
 padding:14px!important;
 border:2px solid var(--blue)!important;
 text-align:center;
}
.secondary-settings-label{
 grid-column:1/-1;
 margin-top:8px;
 padding-top:14px;
 border-top:1px dashed var(--border);
 display:flex;
 align-items:center;
 justify-content:space-between;
}
.secondary-settings-label span{
 font-size:10px;
 font-weight:900;
 letter-spacing:.12em;
 color:var(--muted);
}
.secondary-settings-label small{
 color:var(--muted);
 font-size:10px;
}
.secondary-field{
 opacity:.82;
 background:var(--input);
 padding:10px;
 border-radius:9px;
 border:1px solid var(--border);
}
.secondary-field input,.secondary-field select{
 font-size:13px!important;
 padding:9px!important;
}
@media(max-width:620px){
 .recruiter-input-grid{grid-template-columns:1fr!important}
 .secondary-settings-label{display:block}
 .secondary-settings-label small{display:block;margin-top:4px}
}
@media print{.no-print-rtr{display:none!important}}

button:hover{transform:translateY(-1px);box-shadow:0 7px 16px rgba(15,65,100,.14)}
h1,h2,h3{letter-spacing:-.015em}

 if(m===&#x27;c2c&#x27;){ $(&#x27;modelName&#x27;).textContent=&#x27;C2C&#x27;;$(&#x27;basisName&#x27;).textContent=&#x27;C2C Rate&#x27;;$(&#x27;payLabel&#x27;).textContent=&#x27;C2C Pay Rate ($/hr)&#x27;;$(&#x27;rPayLabel&#x27;).textContent=&#x27;C2C PAY RATE&#x27;;burden.value=0;hours.value=40;pr.value=0;br.value=0; }
 if(m===&#x27;1099&#x27;){ $(&#x27;modelName&#x27;).textContent=&#x27;1099&#x27;;$(&#x27;basisName&#x27;).textContent=&#x27;Contractor Rate&#x27;;$(&#x27;payLabel&#x27;).textContent=&#x27;1099 Pay Rate ($/hr)&#x27;;$(&#x27;rPayLabel&#x27;).textContent=&#x27;1099 PAY RATE&#x27;;burden.value=0;hours.value=40;pr.value=0;br.value=0; }
 if(m===&#x27;travel&#x27;){ $(&#x27;modelName&#x27;).textContent=&#x27;Healthcare Travel&#x27;;$(&#x27;basisName&#x27;).textContent=&#x27;Taxable + Stipend&#x27;;$(&#x27;payLabel&#x27;).textContent=&#x27;Taxable Pay Rate ($/hr)&#x27;;$(&#x27;rPayLabel&#x27;).textContent=&#x27;TAXABLE PAY RATE&#x27;;burden.value=15;hours.value=36;pr.value=37; }

function calculate(){
 const br=Number($(&#x27;br&#x27;).value)||0, pr=Number($(&#x27;pr&#x27;).value)||0, hrs=Number($(&#x27;hours&#x27;).value)||0, tenure=Number($(&#x27;tenure&#x27;).value)||0;
 const msp=Number($(&#x27;msp&#x27;).value)||0, burdenPct=Number($(&#x27;burden&#x27;).value)||0, ops=Number($(&#x27;ops&#x27;).value)||0, desired=Number($(&#x27;desired&#x27;).value)||0;
 const stipend=mode===&#x27;travel&#x27;?(Number($(&#x27;stipend&#x27;).value)||0):0;
 const otHours=Number($(&#x27;otHours&#x27;).value)||0, otMult=Number($(&#x27;otMult&#x27;).value)||1.5, clientMult=Number($(&#x27;clientOtMult&#x27;).value)||0;
 const mspHr=br*msp/100, netBr=br-mspHr, burdenHr=pr*burdenPct/100, stipendHr=hrs?stipend/hrs:0;
 const totalCostHr=pr+burdenHr+stipendHr;
 const grossMargin=netBr-totalCostHr, netMargin=grossMargin-ops, netPct=netBr?netMargin/netBr*100:0;
 const candOtBase=pr*otMult*(1+burdenPct/100);
 const clientOtRevenue=br*clientMult*(1-msp/100);
 const otMarginHr=clientOtRevenue-candOtBase-ops;
 const weeklyMargin=netMargin*hrs+(otHours?otMarginHr*otHours:0);
 const contractMargin=weeklyMargin*tenure;
 const weeklyPackage=pr*hrs+stipend+(otHours?pr*otMult*otHours:0);
 const contractEarnings=weeklyPackage*tenure;
 const contractRevenue=(netBr*hrs+clientOtRevenue*otHours)*tenure;
 const contractCost=((totalCostHr*hrs)+(candOtBase*otHours))*tenure;
 const divisor=1+burdenPct/100;
 const maxPay=Math.max(0,(netBr-ops-desired-stipendHr)/divisor);

 $(&#x27;netMargin&#x27;).textContent=money(netMargin);
 $(&#x27;grossMargin&#x27;).textContent=money(grossMargin);
 $(&#x27;netPct&#x27;).textContent=netPct.toFixed(2)+&#x27;%&#x27;;
 $(&#x27;weeklyMargin&#x27;).textContent=money(weeklyMargin);
 $(&#x27;contractMargin&#x27;).textContent=money(contractMargin);
 $(&#x27;mspHr&#x27;).textContent=money(mspHr);$(&#x27;mspCalcNote&#x27;).textContent=msp.toFixed(2)+&#x27;% of Bill Rate&#x27;;$(&#x27;netBr&#x27;).textContent=money(netBr);$(&#x27;burdenHr&#x27;).textContent=money(burdenHr);
 $(&#x27;stipendHr&#x27;).textContent=money(stipendHr);$(&#x27;totalCostHr&#x27;).textContent=money(totalCostHr);$(&#x27;maxPay&#x27;).textContent=money(maxPay)+&#x27;/hr&#x27;;
 $(&#x27;contractRevenue&#x27;).textContent=money(contractRevenue);$(&#x27;contractCost&#x27;).textContent=money(contractCost);
 $(&#x27;rPay&#x27;).textContent=money(pr)+&#x27;/hr&#x27;;$(&#x27;rStipend&#x27;).textContent=money(stipend);$(&#x27;rWeekly&#x27;).textContent=money(weeklyPackage);
 $(&#x27;rHours&#x27;).textContent=hrs.toFixed(0)+&#x27; hours&#x27;;$(&#x27;rTenure&#x27;).textContent=tenure.toFixed(0)+&#x27; weeks&#x27;;$(&#x27;rContract&#x27;).textContent=money(contractEarnings);

 const d=$(&#x27;decision&#x27;);
 if(netMargin&gt;=7){d.className=&#x27;decision good&#x27;;d.innerHTML=&#x27;✅ PROCEED — Healthy Margin&lt;small&gt;Net Margin: &#x27;+money(netMargin)+&#x27;/hr · &#x27;+netPct.toFixed(2)+&#x27;%&lt;/small&gt;&#x27;}
 else if(netMargin&gt;=5){d.className=&#x27;decision warn&#x27;;d.innerHTML=&#x27;⚠️ MANAGER APPROVAL REQUIRED&lt;small&gt;Net Margin: &#x27;+money(netMargin)+&#x27;/hr · &#x27;+netPct.toFixed(2)+&#x27;%&lt;/small&gt;&#x27;}
 else{d.className=&#x27;decision stop&#x27;;d.innerHTML=&#x27;⛔ DO NOT PROCEED — Margin Below Minimum&lt;small&gt;Net Margin: &#x27;+money(netMargin)+&#x27;/hr · &#x27;+netPct.toFixed(2)+&#x27;%&lt;/small&gt;&#x27;}

 const ow=$(&#x27;otWarning&#x27;);
 if(otHours&gt;0 &amp;&amp; otMarginHr&lt;0){ow.style.display=&#x27;block&#x27;;ow.innerHTML=&#x27;⚠️ OT MARGIN WARNING — Each OT hour reduces margin by &#x27;+money(Math.abs(otMarginHr))+&#x27;. Weekly OT impact at &#x27;+otHours+&#x27; hours: -&#x27;+money(Math.abs(otMarginHr*otHours))+&#x27;.&#x27;}
 else if(otHours&gt;0 &amp;&amp; $(&#x27;otMode&#x27;).value!==&#x27;premium&#x27;){ow.style.display=&#x27;block&#x27;;ow.innerHTML=&#x27;⚠️ OT REVIEW — Candidate OT cost is &#x27;+money(candOtBase)+&#x27;/hr while client OT revenue is &#x27;+money(clientOtRevenue)+&#x27;/hr. OT margin impact: &#x27;+money(otMarginHr)+&#x27;/hr.&#x27;}
 else{ow.style.display=&#x27;none&#x27;;ow.innerHTML=&#x27;&#x27;}

 let pitch;
 if(mode===&#x27;travel&#x27;){
 pitch=`Hi,\n\nThe pay package for this opportunity is:\n\n• Taxable Pay: ${money(pr)}/hour on W2\n• Weekly Non-Taxable Stipend: ${money(stipend)}*\n• Gross Weekly Package: ${money(weeklyPackage)} based on ${hrs.toFixed(0)} regular hours/week\n• Assignment Duration: ${tenure.toFixed(0)} weeks\n• Estimated Gross Contract Earnings: ${money(contractEarnings)}\n\nPlease let me know if this package works for you and we can discuss the next steps.\n\n*Non-taxable stipend is available to eligible travelers based on applicable tax-home and assignment requirements.`;
 } else {
 const type=mode===&#x27;w2&#x27;?&#x27;W2&#x27;:mode===&#x27;c2c&#x27;?&#x27;C2C&#x27;:&#x27;1099&#x27;;
 const fullName=($(&#x27;rtrCandidateName&#x27;).value || &#x27;[Candidate Full Legal Name]&#x27;).trim();
 const clientName=($(&#x27;rtrClientName&#x27;).value || &#x27;[Client Name]&#x27;).trim();
 pitch=`Right to Represent (RTR)\n\nI, ${fullName}, hereby authorize to represent and submit my profile for the opportunity with ${clientName} at a pay rate of ${money(pr)}/hour on ${type}.\n\nI confirm that I have not authorized any other staffing agency or recruiter to represent or submit my profile for the same position with ${clientName}. I will not authorize any other agency or recruiter to submit my profile for this same position after providing this authorization.\n\nI confirm that the information provided in my resume and during the recruitment process is accurate to the best of my knowledge.\n\nFull Legal Name: ${fullName}\nClient Name: ${clientName}\nPay Rate: ${money(pr)}/hour on ${type}\n\nPlease reply with “I Agree” to confirm this Right to Represent authorization.`;
 }
 $(&#x27;pitch&#x27;).textContent=pitch;
}

body.dark .danger-warning{background:#3b2024;color:#ffaaaa}
.pitch-box{border:2px solid var(--p);border-radius:12px;padding:18px;background:var(--input)}
.pitch-text{font-size:17px;line-height:1.7;font-weight:700}
.copy-btn{margin-top:14px;padding:10px 14px;border:0;border-radius:8px;background:var(--p);color:#fff;font-weight:700;cursor:pointer}
.copy-status{margin-top:8px;color:var(--good);font-size:13px;font-weight:700}

.fixed-panel{margin-top:18px;border:1px solid var(--border);border-radius:12px;padding:16px;background:var(--input)}
.fixed-title{font-weight:800;color:var(--p);margin-bottom:12px}
.fixed-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.fixed-item{border:1px solid var(--border);border-radius:9px;padding:12px;text-align:center}
.fixed-item span{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}
.fixed-item strong{font-size:20px}
@media(max-width:700px){.fixed-grid{grid-template-columns:1fr}}

.guide-box{margin-top:22px;border:1px solid var(--border);border-radius:12px;background:var(--input);overflow:hidden}
.guide-box summary{padding:16px 18px;font-weight:800;color:var(--p);cursor:pointer;font-size:18px}
.guide-content{padding:0 18px 18px}
.gsa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
.gsa-results{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
.gsa-note{padding:12px;border-radius:9px;background:var(--card);border:1px solid var(--border);line-height:1.6}
.gsa-status{margin-top:14px;padding:14px;border-radius:9px;font-weight:800}
.gsa-ok{border:2px solid #16834b;background:#effaf3;color:#116b3c}
.gsa-over{border:2px solid #c62828;background:#fff0f0;color:#9b1c1c}
body.dark .gsa-ok{background:#173426;color:#7ee0a8}
body.dark .gsa-over{background:#3b2024;color:#ffaaaa}
.gsa-link{display:inline-block;margin-top:12px;padding:10px 14px;border-radius:8px;background:var(--p);color:#fff;text-decoration:none;font-weight:700}
@media(max-width:700px){.gsa-grid,.gsa-results{grid-template-columns:1fr}}

.action-bar{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
.secondary-btn{padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--input);color:var(--text);font-weight:700;cursor:pointer}
.decision-card{padding:16px;border-radius:12px;text-align:center;font-size:22px;font-weight:900;margin:14px 0;border:2px solid var(--border)}
.decision-good{border-color:#16834b;background:#effaf3;color:#116b3c}
.decision-warn{border-color:#d49b00;background:#fff8dc;color:#6f5200}
.decision-stop{border-color:#c62828;background:#fff0f0;color:#9b1c1c}
body.dark .decision-good{background:#173426;color:#7ee0a8}
body.dark .decision-warn{background:#3a3217;color:#ffe59a}
body.dark .decision-stop{background:#3b2024;color:#ffaaaa}
.quality-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0 16px}
.quality-item{padding:10px;border:1px solid var(--border);border-radius:9px;text-align:center;background:var(--input)}
.quality-item span{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}
.quality-item strong{font-size:14px}
@media(max-width:700px){.quality-grid{grid-template-columns:repeat(2,1fr)}}
@media print{.action-bar,.theme,.calc,.copy-btn{display:none!important}body{background:#fff!important}.card{box-shadow:none!important}}

.top-action-bar{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0 4px}
.reset-btn,.pdf-btn{padding:12px 14px;border:0;border-radius:9px;font-weight:800;cursor:pointer;font-size:14px}
.reset-btn{background:#e9eef5;color:#26384a;border:1px solid #bcc9d8}
.pdf-btn{background:#1769aa;color:#fff;border:1px solid #1769aa}
body.dark .reset-btn{background:#34404d;color:#eef4fa;border-color:#586979}
body.dark .pdf-btn{background:#287fc2;border-color:#287fc2}
@media(max-width:520px){.top-action-bar{grid-template-columns:1fr 1fr;gap:8px}.reset-btn,.pdf-btn{font-size:12px;padding:11px 7px}}
@media print{.top-action-bar{display:none!important}}

.recruiter-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:7px}
.recruiter-panel{margin-top:14px;border:2px solid var(--p);border-radius:12px;padding:16px;background:var(--input)}
.recruiter-panel h2{margin-top:0}
.talk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.talk-item{padding:12px;border:1px solid var(--border);border-radius:9px;background:var(--card)}
.talk-item span{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}
.talk-item strong{font-size:17px}
.timestamp{font-size:12px;color:var(--muted);text-align:right;margin-top:8px}
.validation-box{display:none;margin:12px 0;padding:14px;border:2px solid #c62828;border-radius:10px;background:#fff0f0;color:#9b1c1c;font-weight:800}
body.dark .validation-box{background:#3b2024;color:#ffaaaa}
.identity-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
@media(max-width:700px){.talk-grid{grid-template-columns:1fr 1fr}.identity-grid{grid-template-columns:1fr}}

:root{--accent:#0b4a7f;--accent2:#1f8f5f;--soft:#f4f8fc;--gold:#b8860b}
body{background:linear-gradient(180deg,#f7fbff 0,#eef5fb 100%)}
.card{max-width:1180px!important;border-radius:18px!important;box-shadow:0 14px 40px rgba(20,55,90,.10)!important}
.approval-details{margin:14px 0;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:linear-gradient(135deg,var(--input),var(--card))}
.section-kicker,.eyebrow{font-size:11px;font-weight:900;letter-spacing:.12em;color:var(--p);text-transform:uppercase;margin-bottom:7px}
.optional-tag{font-size:10px;padding:3px 7px;border-radius:999px;background:#e8f1f8;color:#456;font-weight:700}
.required-tag{background:#fff0d6;color:#8a5b00}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:12px}
.section-head h2{margin:0}
.margin-zone,.recruiter-focus,.pitch-section{margin-top:18px;padding:18px;border-radius:15px;background:var(--card);border:1px solid var(--border)}
.margin-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.margin-card{padding:14px;border-radius:12px;background:var(--input);border:1px solid var(--border);min-width:0}
.margin-card span{display:block;font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.03em}
.margin-card strong{display:block;font-size:23px;margin-top:7px;line-height:1.1}
.margin-card small{display:block;margin-top:6px;color:var(--muted);font-size:11px;line-height:1.3}
.net-card{background:linear-gradient(135deg,#eaf8f0,#f8fffb);border:2px solid #1f8f5f}
.net-card strong{font-size:31px;color:#167448}
body.dark .net-card{background:linear-gradient(135deg,#173426,#1f2e28)}
.recruiter-focus{background:linear-gradient(135deg,#f7fbff,#ffffff)}
body.dark .recruiter-focus{background:linear-gradient(135deg,#1c2834,#18222c)}
.recruiter-lead{color:var(--muted);margin-bottom:12px}
.package-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.package-card{padding:14px;border-radius:12px;background:var(--card);border:1px solid var(--border)}
.package-card span{display:block;color:var(--muted);font-size:11px;font-weight:700}
.package-card strong{display:block;font-size:19px;margin-top:6px;line-height:1.2}
.pay-card,.stipend-card,.weekly-card{border-top:4px solid var(--p)}
.weekly-card{background:linear-gradient(135deg,#edf7ff,#fff)}
body.dark .weekly-card{background:#20303f}
.candidate-tip{margin-top:12px;padding:12px 14px;border-radius:10px;background:#fff8e7;border-left:4px solid #d69b19;color:#6f5200;line-height:1.5}
body.dark .candidate-tip{background:#3a3217;color:#ffe59a}
.pitch-modern{background:linear-gradient(135deg,#f4f9ff,#fff);border:1px solid #bdd5ea}
body.dark .pitch-modern{background:#1c2936}
.internal-details summary span{font-size:12px;color:var(--muted);font-weight:500;margin-left:8px}
.internal-grid{grid-template-columns:repeat(4,1fr)!important}
.metric strong{display:block!important;margin-top:5px;line-height:1.2}
.metric small{display:block!important;margin-top:6px!important;line-height:1.35!important}
.max-pay-card strong{margin-bottom:4px}
@media(max-width:1000px){.margin-grid{grid-template-columns:repeat(3,1fr)}.package-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.margin-grid,.package-grid,.internal-grid{grid-template-columns:repeat(2,1fr)!important}.section-head{align-items:flex-start;flex-direction:column}.timestamp{text-align:left}}
@media(max-width:480px){.margin-grid,.package-grid,.internal-grid{grid-template-columns:1fr!important}}

.print-modal{position:fixed;inset:0;background:rgba(10,25,40,.62);display:none;align-items:center;justify-content:center;padding:20px;z-index:9999}

.print-modal-card{width:min(680px,96vw);background:var(--card);color:var(--text);border-radius:18px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.28);position:relative}

.print-identity-banner{display:none}
#marginWarning,#otWarning{margin-top:12px!important;font-size:15px;line-height:1.5}
.warning-box{box-shadow:0 6px 18px rgba(0,0,0,.06)}
@media print{
 .print-identity-banner{display:grid!important;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;padding:12px;border:1px solid #ccd6df;border-radius:8px}

.primary-rate-inputs{margin-top:28px!important;padding-top:6px}

/* Final recruiter-first visual system */
:root{
 --success:#16834b;
 --success-soft:#edf9f2;
 --warning:#b77900;
 --warning-soft:#fff7df;
 --danger:#c93636;
 --danger-soft:#fff0f0;
 --info:#1769aa;
 --info-soft:#eef6fc;
}
.internal-badge{display:inline-block;margin-left:8px;padding:3px 7px;border-radius:999px;background:#e9eef4;color:#536474;font-size:9px;font-weight:900;letter-spacing:.08em;vertical-align:middle}
body.dark .internal-badge{background:#344454;color:#d7e3ed}
.decision-card{font-size:24px!important;padding:18px!important;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.decision-good{background:var(--success-soft)!important;border-color:var(--success)!important;color:var(--success)!important}
.decision-warn{background:var(--warning-soft)!important;border-color:var(--warning)!important;color:#805600!important}
.decision-stop{background:var(--danger-soft)!important;border-color:var(--danger)!important;color:var(--danger)!important}
.fixed-panel{padding:10px 14px!important;margin-top:12px!important}
.fixed-title{font-size:12px!important;margin-bottom:7px!important}
.fixed-grid{display:flex!important;gap:8px!important;flex-wrap:wrap}
.fixed-item{flex:1;min-width:150px;padding:7px 10px!important;display:flex;align-items:center;justify-content:space-between;text-align:left!important}
.fixed-item span{margin:0!important;font-size:10px!important}
.fixed-item strong{font-size:14px!important}
.package-grid{grid-template-columns:repeat(4,1fr)!important}
.pay-card,.stipend-card,.weekly-card{padding:17px!important}
.pay-card strong,.stipend-card strong{font-size:24px!important}
.weekly-card{grid-column:span 2;background:linear-gradient(135deg,#e8f5ff,#f8fcff)!important;border:2px solid var(--info)!important}

body.dark .weekly-card{background:#1c3040!important}
.pitch-section{margin-top:14px!important}
.internal-details{margin-top:18px}
.warning-box.danger-warning{background:var(--danger-soft)!important;border-color:var(--danger)!important;color:#982525!important}
.warning-box:not(.danger-warning):not(.healthy-warning){background:var(--warning-soft)!important;border-color:var(--warning)!important;color:#795300!important}

}

}

function renderEasyCalculationStory(){
 const target=$(&#x27;details&#x27;);
 if(!target)return;

 const br=num(&#x27;br&#x27;), msp=num(&#x27;msp&#x27;), pr=num(&#x27;pr&#x27;), tax=num(&#x27;tax&#x27;),
       stipend=num(&#x27;stipend&#x27;), hrs=num(&#x27;hours&#x27;), tenure=num(&#x27;tenure&#x27;)||13,
       ops=num(&#x27;ops&#x27;), desired=num(&#x27;desiredMargin&#x27;),
       otHours=num(&#x27;otHours&#x27;), otMult=num(&#x27;otMult&#x27;)||1.5;

 if(br&lt;=0 || hrs&lt;=0){
   target.innerHTML=&#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;Enter package details to view the story&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;Add a Bill Rate and Hours per Week. The story will then explain the package calculation step by step.&lt;/div&gt;&lt;/div&gt;&#x27;;
   return;
 }

 const fee=br*msp/100;
 const actualBR=br-fee;
 const payrollLoad=pr*tax/100;
 const loadedPay=pr+payrollLoad;
 const stipendHr=hrs&gt;0?stipend/hrs:0;
 const actualCost=loadedPay+stipendHr;
 const grossMargin=actualBR-actualCost;
 const netMargin=grossMargin-ops;
 const netPct=actualBR?netMargin/actualBR*100:0;
 const grossWeekly=pr*hrs+stipend;
 const weeklyMargin=netMargin*hrs;
 const contractMargin=weeklyMargin*tenure;
 const maxTaxLoaded=actualBR-stipendHr-ops-desired;
 const maxPay=Math.max(0,maxTaxLoaded/(1+tax/100));

 target.innerHTML=
 &#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;🏥 1. How much money comes in?&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;The facility pays &lt;b&gt;&#x27;+money(br)+&#x27;/hr&lt;/b&gt;.&lt;br&gt;MSP fee at &#x27;+msp.toFixed(2)+&#x27;% = &#x27;+money(fee)+&#x27;/hr.&lt;br&gt;Net bill rate after MSP fee = &lt;b&gt;&#x27;+money(actualBR)+&#x27;/hr&lt;/b&gt;.&lt;/div&gt;&lt;/div&gt;&#x27;+
 &#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;👩‍⚕️ 2. What is the taxable pay cost?&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;Candidate taxable pay = &#x27;+money(pr)+&#x27;/hr.&lt;br&gt;Payroll load = &#x27;+money(payrollLoad)+&#x27;/hr.&lt;br&gt;Tax-loaded pay cost = &lt;b&gt;&#x27;+money(loadedPay)+&#x27;/hr&lt;/b&gt;.&lt;/div&gt;&lt;/div&gt;&#x27;+
 &#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;🏠 3. Convert weekly stipend to hourly cost&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;&#x27;+money(stipend)+&#x27; ÷ &#x27;+hrs.toFixed(0)+&#x27; hours = &lt;b&gt;&#x27;+money(stipendHr)+&#x27;/hr&lt;/b&gt;.&lt;/div&gt;&lt;/div&gt;&#x27;+
 &#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;💵 4. What is the actual candidate cost?&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;Tax-loaded pay &#x27;+money(loadedPay)+&#x27; + stipend cost &#x27;+money(stipendHr)+&#x27; = &lt;b&gt;&#x27;+money(actualCost)+&#x27;/hr&lt;/b&gt;.&lt;br&gt;Candidate weekly package = &lt;b&gt;&#x27;+money(grossWeekly)+&#x27;/week&lt;/b&gt;.&lt;/div&gt;&lt;/div&gt;&#x27;+
 &#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;⭐ 5. What is the margin?&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;Net bill rate &#x27;+money(actualBR)+&#x27; − candidate cost &#x27;+money(actualCost)+&#x27; = &#x27;+money(grossMargin)+&#x27;/hr gross margin.&lt;br&gt;After &#x27;+money(ops)+&#x27;/hr operational cost, net margin = &lt;b&gt;&#x27;+money(netMargin)+&#x27;/hr (&#x27;+netPct.toFixed(2)+&#x27;%)&lt;/b&gt;.&lt;/div&gt;&lt;/div&gt;&#x27;+
 &#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;🎯 6. Maximum taxable Pay Rate&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;To retain at least &lt;b&gt;&#x27;+money(desired)+&#x27;/hr&lt;/b&gt; target net margin, maximum taxable Pay Rate is &lt;b&gt;&#x27;+money(maxPay)+&#x27;/hr&lt;/b&gt; with the current stipend and cost assumptions.&lt;/div&gt;&lt;/div&gt;&#x27;+
 (otHours&gt;0?&#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;⏰ 7. Overtime note&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;Current setup includes &lt;b&gt;&#x27;+otHours.toFixed(0)+&#x27; OT hours&lt;/b&gt; at a &#x27;+otMult.toFixed(2)+&#x27;× multiplier. The main calculator results show the exact OT revenue and cost impact based on whether client OT billing is enabled.&lt;/div&gt;&lt;/div&gt;&#x27;:&#x27;&#x27;)+
 &#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;🧮 &#x27;+(otHours&gt;0?&#x27;8&#x27;:&#x27;7&#x27;)+&#x27;. Weekly and contract result&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;Regular weekly net margin = &lt;b&gt;&#x27;+money(weeklyMargin)+&#x27;&lt;/b&gt;.&lt;br&gt;&#x27;+tenure.toFixed(0)+&#x27;-week regular contract margin = &lt;b&gt;&#x27;+money(contractMargin)+&#x27;&lt;/b&gt;.&lt;/div&gt;&lt;/div&gt;&#x27;+
 &#x27;&lt;div class=&quot;step story&quot;&gt;&lt;div class=&quot;title&quot;&gt;&lt;strong&gt;📣 Simple recruiter takeaway&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;formula story&quot;&gt;Candidate package = &lt;b&gt;&#x27;+money(grossWeekly)+&#x27;/week&lt;/b&gt;.&lt;br&gt;Net company margin = &lt;b&gt;&#x27;+money(netMargin)+&#x27;/hr&lt;/b&gt;.&lt;br&gt;Maximum taxable Pay Rate at the selected target margin = &lt;b&gt;&#x27;+money(maxPay)+&#x27;/hr&lt;/b&gt;.&lt;/div&gt;&lt;/div&gt;&#x27;;
}

function calculate(){
let validationErrors=[];
let rawBr=parseFloat($(&#x27;br&#x27;).value),rawPr=parseFloat($(&#x27;pr&#x27;).value),rawStipend=parseFloat($(&#x27;stipend&#x27;).value),rawHours=parseFloat($(&#x27;hours&#x27;).value),rawTenure=parseFloat($(&#x27;tenure&#x27;).value);
if(!Number.isFinite(rawBr) || rawBr&lt;=0) validationErrors.push(&#x27;Bill Rate must be greater than $0.&#x27;);
if(!Number.isFinite(rawPr) || rawPr&lt;0) validationErrors.push(&#x27;Pay Rate cannot be blank or negative.&#x27;);
if(!Number.isFinite(rawStipend) || rawStipend&lt;0) validationErrors.push(&#x27;Weekly Stipend cannot be blank or negative.&#x27;);
if(!Number.isFinite(rawHours) || rawHours&lt;=0) validationErrors.push(&#x27;Hours per Week must be greater than 0.&#x27;);
if(!Number.isFinite(rawTenure) || rawTenure&lt;=0) validationErrors.push(&#x27;Contract Tenure must be greater than 0 weeks.&#x27;);

 const blocked=[&#x27;required technical skills &amp; qualifications&#x27;,&#x27;preferred qualifications (a plus)&#x27;,&#x27;preferred qualifications&#x27;,&#x27;required skill sets&#x27;,&#x27;required skills&#x27;,&#x27;desired skills&#x27;,&#x27;technical skills&#x27;,&#x27;qualifications&#x27;,&#x27;minimum qualifications&#x27;,&#x27;education requirements&#x27;,&#x27;experience requirements&#x27;,&#x27;responsibilities&#x27;,&#x27;job responsibilities&#x27;,&#x27;top skills&#x27;,&#x27;skills matrix&#x27;,&#x27;about the project&#x27;,&#x27;about project&#x27;];
 function isHeading(x){
 const clean=x.toLowerCase().replace(/[:\-–—]+$/,&#x27;&#x27;).trim();
 if(blocked.includes(clean))return true;
 return clean.length&lt;65 &amp;&amp; /^(required|preferred|desired|minimum|technical|top)\s+(skills?|qualifications?|skill sets?|requirements?)$/i.test(clean);
 }
 const out=known.filter(function(s){return jd.toLowerCase().includes(s.toLowerCase());});
 jd.split(/\n/).map(x=&gt;x.trim()).filter(function(x){
 return x.length&gt;8&amp;&amp;x.length&lt;180&amp;&amp;!isHeading(x)&amp;&amp;/required|desired|preferred|minimum|must have|years? of experience/i.test(x);
 }).slice(0,14).forEach(function(x){const c=x.replace(/^[-•*\d.)\s]+/,&#x27;&#x27;).trim();if(c&amp;&amp;!isHeading(c))out.push(c);});
 return [...new Set(out)].filter(x=&gt;!isHeading(x)).slice(0,20);
}
function cleanTextMeta(v){

function findJDValue(jd,labels){

 for(const label of labels){
 const rx=new RegExp(&#x27;^&#x27;+label+&#x27;\\s*[:\\-]\\s*(.+)$&#x27;,&#x27;i&#x27;);
 for(const line of lines){const m=line.match(rx);if(m)return m[1].trim();}
 }
 return &#x27;&#x27;;
}
function inferJD(jd){

   location:cleanTextMeta(findJDValue(jd,[&#x27;location&#x27;,&#x27;job\\s*location&#x27;,&#x27;work\\s*location&#x27;])),

   department:cleanTextMeta(findJDValue(jd,[&#x27;state\\s*agency&#x27;,&#x27;department&#x27;,&#x27;agency&#x27;]))

}
function formatJDContent(jd){
 const headingRx=/^(responsibilities|job responsibilities|about(?: the)? project|required skills|required technical skills(?: &amp; qualifications)?|preferred qualifications(?: \(a plus\))?|required skill sets|top skills|desired skills|qualifications|minimum qualifications|education|experience|skills matrix|job description|summary|overview)\s*:?\s*$/i;
 return jd.split(/\n/).map(function(raw){
 const line=raw.trim();
 if(!line)return &#x27;&lt;br&gt;&#x27;;
 if(headingRx.test(line))return &#x27;&lt;div style=&quot;font-weight:800;margin-top:14px;margin-bottom:7px&quot;&gt;&#x27;+escapeHTML(line.replace(/:$/,&#x27;&#x27;))+&#x27;&lt;/div&gt;&#x27;;
 const bullet=line.match(/^[-•*]\s*(.+)$/);
 const numbered=line.match(/^(\d+[.)])\s*(.+)$/);
 if(bullet)return &#x27;&lt;div style=&quot;margin:0 0 8px 18px&quot;&gt;• &#x27;+escapeHTML(bullet[1])+&#x27;&lt;/div&gt;&#x27;;
 if(numbered)return &#x27;&lt;div style=&quot;margin:0 0 8px 18px&quot;&gt;&#x27;+escapeHTML(numbered[1])+&#x27; &#x27;+escapeHTML(numbered[2])+&#x27;&lt;/div&gt;&#x27;;
 return &#x27;&lt;div style=&quot;margin-bottom:9px&quot;&gt;&#x27;+escapeHTML(line)+&#x27;&lt;/div&gt;&#x27;;
 }).join(&#x27;&#x27;);
}

function escapeHTML(value){
 const div=document.createElement(&#x27;div&#x27;);
 div.textContent=String(value==null?&#x27;&#x27;:value);
 return div.innerHTML;
}

function formatImportantDetails(candidate,rate,jobId,emp,agency,title){
 const exactValues=[candidate,agency,title,jobId,emp];
 if(rate)exactValues.push(&#x27;$&#x27;+Number(rate).toFixed(2)+&#x27;/hour&#x27;);
 [el(&#x27;topText&#x27;),el(&#x27;bottomText&#x27;)].forEach(function(node){
 let html=escapeHTML(node.textContent).replace(/\n/g,&#x27;&lt;br&gt;&#x27;);
 exactValues.sort((a,b)=&gt;String(b).length-String(a).length).forEach(function(v){
 if(!v)return;
 const e=escapeHTML(String(v));
 const token=&#x27;@@HL&#x27;+Math.random().toString(36).slice(2)+&#x27;@@&#x27;;
 html=html.split(e).join(token+e+&#x27;@@END@@&#x27;);
 html=html.split(token).join(&#x27;&lt;strong&gt;&lt;u&gt;&#x27;).split(&#x27;@@END@@&#x27;).join(&#x27;&lt;/u&gt;&lt;/strong&gt;&#x27;);
 });
 node.innerHTML=html;
 });
}

function showCopied(id){

function writeRichClipboard(html,text,statusId){
 const holder=document.createElement(&#x27;div&#x27;);
 holder.contentEditable=&#x27;true&#x27;;
 holder.style.position=&#x27;fixed&#x27;;
 holder.style.left=&#x27;-10000px&#x27;;
 holder.style.top=&#x27;0&#x27;;
 holder.innerHTML=html;
 document.body.appendChild(holder);
 let copied=false;
 try{
 const range=document.createRange();
 range.selectNodeContents(holder);
 const selection=window.getSelection();
 selection.removeAllRanges();
 selection.addRange(range);
 copied=document.execCommand(&#x27;copy&#x27;);
 selection.removeAllRanges();
 }catch(e){copied=false;}
 holder.remove();

 if(!copied){
 const ta=document.createElement(&#x27;textarea&#x27;);
 ta.value=text;
 ta.style.position=&#x27;fixed&#x27;;
 ta.style.left=&#x27;-10000px&#x27;;
 document.body.appendChild(ta);
 ta.focus(); ta.select();
 try{copied=document.execCommand(&#x27;copy&#x27;);}catch(e){copied=false;}
 ta.remove();
 }
 if(copied)showCopied(statusId);
}

function cleanLegacyDocText(text){
 return (text||&#x27;&#x27;)
  .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g,&#x27; &#x27;)
  .replace(/[ \t]{2,}/g,&#x27; &#x27;)
  .replace(/\n[ \t]+/g,&#x27;\n&#x27;)
  .replace(/\n{3,}/g,&#x27;\n\n&#x27;)
  .trim();
}
function extractLegacyDocLocally(buffer){
 const bytes=new Uint8Array(buffer);
 let latin=&#x27;&#x27;;
 for(let i=0;i&lt;bytes.length;i++){
   const c=bytes[i];
   latin+=(c===9||c===10||c===13||(c&gt;=32&amp;&amp;c&lt;=126))?String.fromCharCode(c):&#x27; &#x27;;
 }
 const view=new DataView(buffer);
 let unicode=&#x27;&#x27;;
 for(let i=0;i+1&lt;bytes.length;i+=2){
   const code=view.getUint16(i,true);
   if(code===9||code===10||code===13||(code&gt;=32&amp;&amp;code&lt;=0xD7FF))unicode+=String.fromCharCode(code);
   else unicode+=&#x27; &#x27;;
 }
 const a=cleanLegacyDocText(latin),b=cleanLegacyDocText(unicode);
 const score=t=&gt;(t.match(/[A-Za-z]{3,}/g)||[]).length;
 return score(b)&gt;score(a)?b:a;
}
async function extractLegacyDoc(file){
 // First try the secure backend, if it supports document extraction.
 try{
   const fd=new FormData();
   fd.append(&#x27;file&#x27;,file);
   fd.append(&#x27;action&#x27;,&#x27;extract_resume&#x27;);
   const res=await fetch(&#x27;https://staffing-intelligence-ai.sachinsonigroup.workers.dev&#x27;,{method:&#x27;POST&#x27;,body:fd});
   if(res.ok){
     const type=res.headers.get(&#x27;content-type&#x27;)||&#x27;&#x27;;
     if(type.includes(&#x27;application/json&#x27;)){
       const d=await res.json();
       const text=d.text||d.resume_text||d.extracted_text||&#x27;&#x27;;
       if(text.trim())return text;
     }else{
       const text=await res.text();
       if(text.trim())return text;
     }
   }
 }catch(e){}
 // Local fallback for classic binary Word files.
 const buf=await file.arrayBuffer();
 const text=extractLegacyDocLocally(buf);
 if((text.match(/[A-Za-z]{3,}/g)||[]).length&lt;25)throw new Error(&#x27;This .doc file could not be reliably extracted. Please save it as DOCX or PDF and upload again.&#x27;);
 return text;
}
async function handleResumeUpload(input){
 const file=input.files&amp;&amp;input.files[0];
 if(!file)return;
 uploadedResumeText=&#x27;&#x27;;uploadedResumeName=file.name;
 const status=$(&#x27;uploadStatus&#x27;);status.textContent=&#x27;Reading &#x27;+file.name+&#x27;…&#x27;;
 try{
   const ext=file.name.split(&#x27;.&#x27;).pop().toLowerCase();
   if(ext===&#x27;txt&#x27;){
     uploadedResumeText=await file.text();
   }else if(ext===&#x27;docx&#x27;){
     if(typeof mammoth===&#x27;undefined&#x27;)throw new Error(&#x27;DOCX reader is still loading. Please try the file again in a moment.&#x27;);
     const buf=await file.arrayBuffer();
     const result=await mammoth.extractRawText({arrayBuffer:buf});
     uploadedResumeText=result.value||&#x27;&#x27;;
   }else if(ext===&#x27;pdf&#x27;){
     if(typeof pdfjsLib===&#x27;undefined&#x27;)throw new Error(&#x27;PDF reader is still loading. Please try the file again in a moment.&#x27;);
     pdfjsLib.GlobalWorkerOptions.workerSrc=&#x27;https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js&#x27;;
     const buf=await file.arrayBuffer();
     const pdf=await pdfjsLib.getDocument({data:buf}).promise;
     const pages=[];
     for(let i=1;i&lt;=pdf.numPages;i++){
       const page=await pdf.getPage(i),content=await page.getTextContent();
       pages.push(content.items.map(x=&gt;x.str).join(&#x27; &#x27;));
     }
     uploadedResumeText=pages.join(&#x27;\n\n&#x27;);
   }else if(ext===&#x27;doc&#x27;){
     status.textContent=&#x27;Reading legacy Word document &#x27;+file.name+&#x27;…&#x27;;
     uploadedResumeText=await extractLegacyDoc(file);
   }else{
     throw new Error(&#x27;Unsupported file type.&#x27;);
   }
   if(!uploadedResumeText.trim())throw new Error(&#x27;No readable resume text was found in the file.&#x27;);
   status.textContent=&#x27;✓ &#x27;+file.name+&#x27; loaded successfully. You can analyze without pasting resume text.&#x27;;
   status.style.color=&#x27;#16784b&#x27;;
 }catch(e){
   uploadedResumeText=&#x27;&#x27;;
   status.textContent=&#x27;Upload could not be read: &#x27;+e.message;
   status.style.color=&#x27;#b42318&#x27;;
 }
}
function ensureSelectedSkillsInResume(text,skills){
 let out=(text||latestResume||&#x27;&#x27;).trim();
 const clean=normalizeSkillList(skills);
 const esc=s=&gt;s.replace(/[.*+?^${}()|[\]\\]/g,&#x27;\\$&amp;&#x27;);
 const absent=clean.filter(s=&gt;!new RegExp(esc(s),&#x27;i&#x27;).test(out));
 if(absent.length){
   const skillLine=absent.join(&#x27; • &#x27;);
   const skillHeading=/\b(TECHNICAL SKILLS|CORE SKILLS|SKILLS)\b\s*:?\s*/i;
   if(skillHeading.test(out))out=out.replace(skillHeading,m=&gt;m+&#x27;\n&#x27;+skillLine+&#x27;\n&#x27;);
   else out=&#x27;TECHNICAL SKILLS\n&#x27;+skillLine+&#x27;\n\n&#x27;+out;
 }
 const stillMissing=clean.filter(s=&gt;!new RegExp(esc(s),&#x27;i&#x27;).test(out));
 if(stillMissing.length)out=&#x27;TECHNICAL SKILLS\n&#x27;+stillMissing.join(&#x27; • &#x27;)+&#x27;\n\n&#x27;+out;
 return out;
}


async function callAI(action,payload){
 const res=await fetch(&#x27;https://staffing-intelligence-ai.sachinsonigroup.workers.dev&#x27;,{
  method:&#x27;POST&#x27;,headers:{&#x27;Content-Type&#x27;:&#x27;application/json&#x27;},
  body:JSON.stringify(Object.assign({action},payload))
 });
 if(!res.ok)throw new Error(&#x27;Backend returned &#x27;+res.status);
 const d=await res.json();
 return d&amp;&amp;d.data&amp;&amp;typeof d.data===&#x27;object&#x27;?Object.assign({},d,d.data):d;
}

function escapeRegExp(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,&#x27;\\$&amp;&#x27;)}
function resumeToHTML(text){
 const lines=String(text||&#x27;&#x27;).split(/\r?\n/);
 return lines.map(line=&gt;{
   const t=line.trim();

function deriveMissingSkillsFromJD(resume,jd){
 const resumeLower=String(resume||&#x27;&#x27;).toLowerCase();
 const text=String(jd||&#x27;&#x27;).replace(/\r/g,&#x27;&#x27;);
 const lines=text.split(&#x27;\n&#x27;);
 const candidates=[];
 const sectionStart=/^(required skills?|technical skills?|top skills?|must[- ]have skills?|minimum qualifications?|required qualifications?|desired skills?|preferred skills?|other desired skills?|skill matrix|skills required)\b/i;
 const sectionStop=/^(responsibilities|duties|about (the )?project|project description|job description|position description|education|location|duration|client|interview|work schedule|submission|notes?)\b/i;
 let inSkillSection=false;

 const addCandidate=(raw,priority=1)=&gt;{
   let s=String(raw||&#x27;&#x27;)
    .replace(/^[-•▪◦*✓✔\d.)\s]+/,&#x27;&#x27;)
    .replace(/\b(required|preferred|desired|mandatory|must have|nice to have)\b\s*:?\s*/ig,&#x27;&#x27;)
    .replace(/\b\d+\+?\s*(?:years?|yrs?)\b.*$/i,&#x27;&#x27;)
    .replace(/\s+/g,&#x27; &#x27;).replace(/[.;:,]+$/,&#x27;&#x27;).trim();
   if(!s || s.length&lt;2 || s.length&gt;80)return;
   // Remove sentence-like soft-skill fragments and generic verbs.
   if(/\b(communicate|communication|written|verbal|ability to|responsible for|work with|working with|appropriately|excellent|strong interpersonal|team player)\b/i.test(s))return;
   if(s.split(/\s+/).length&gt;9)return;
   candidates.push({skill:s,priority});
 };

 for(const raw of lines){
   const t=raw.trim();
   if(!t)continue;
   if(sectionStart.test(t)){inSkillSection=true; 
      const after=t.replace(sectionStart,&#x27;&#x27;).replace(/^[:\s-]+/,&#x27;&#x27;);
      if(after)after.split(/[,;|]/).forEach(x=&gt;addCandidate(x,4));
      continue;
   }
   if(inSkillSection &amp;&amp; sectionStop.test(t)){inSkillSection=false}
   if(inSkillSection){
     if(/^[-•▪◦*✓✔]/.test(t)) addCandidate(t,4);
     else if(t.length&lt;100 &amp;&amp; /[,;|]/.test(t)) t.split(/[,;|]/).forEach(x=&gt;addCandidate(x,3));
   }
 }

 // Explicit technical requirement phrases throughout JD.
 const techPatterns=[
  /\b(?:experience|expertise|proficiency|knowledge|hands-on experience|working experience)\s+(?:with|in|using)\s+([^.\n]{2,100})/gi,
  /\b(?:must have|required)\s+(?:experience\s+(?:with|in)\s+)?([^.\n]{2,100})/gi
 ];
 techPatterns.forEach(rx=&gt;{let z;while((z=rx.exec(text))){
   z[1].split(/[,;]|\band\b/i).forEach(x=&gt;addCandidate(x,2));
 }});

 // Common technical tokens appearing in JD; this catches concise stack requirements.
 const techLexicon=[
 &#x27;Java&#x27;,&#x27;JavaScript&#x27;,&#x27;TypeScript&#x27;,&#x27;Python&#x27;,&#x27;C#&#x27;,&#x27;.NET&#x27;,&#x27;React&#x27;,&#x27;Angular&#x27;,&#x27;Vue&#x27;,&#x27;Node.js&#x27;,&#x27;SQL&#x27;,&#x27;Oracle&#x27;,&#x27;PostgreSQL&#x27;,&#x27;MySQL&#x27;,
 &#x27;AWS&#x27;,&#x27;Azure&#x27;,&#x27;GCP&#x27;,&#x27;Docker&#x27;,&#x27;Kubernetes&#x27;,&#x27;Terraform&#x27;,&#x27;Jenkins&#x27;,&#x27;Git&#x27;,&#x27;GitHub&#x27;,&#x27;GitLab&#x27;,&#x27;CI/CD&#x27;,&#x27;REST API&#x27;,&#x27;GraphQL&#x27;,
 &#x27;Salesforce&#x27;,&#x27;ServiceNow&#x27;,&#x27;SAP&#x27;,&#x27;Workday&#x27;,&#x27;PeopleSoft&#x27;,&#x27;OnBase&#x27;,&#x27;Versa&#x27;,&#x27;Cisco&#x27;,&#x27;Juniper&#x27;,&#x27;Linux&#x27;,&#x27;Unix&#x27;,&#x27;Windows Server&#x27;,
 &#x27;Power BI&#x27;,&#x27;Tableau&#x27;,&#x27;Snowflake&#x27;,&#x27;Databricks&#x27;,&#x27;Spark&#x27;,&#x27;Kafka&#x27;,&#x27;ETL&#x27;,&#x27;SSIS&#x27;,&#x27;SSRS&#x27;,&#x27;Selenium&#x27;,&#x27;Cypress&#x27;,&#x27;Playwright&#x27;,
 &#x27;Accessibility&#x27;,&#x27;WCAG&#x27;,&#x27;ARIA&#x27;,&#x27;Section 508&#x27;,&#x27;HTML&#x27;,&#x27;CSS&#x27;,&#x27;Figma&#x27;,&#x27;Agile&#x27;,&#x27;Scrum&#x27;,&#x27;Jira&#x27;,&#x27;Azure DevOps&#x27;
 ];
 techLexicon.forEach(skill=&gt;{
   const rx=new RegExp(&#x27;(^|[^A-Za-z0-9])&#x27;+escapeRegExp(skill)+&#x27;([^A-Za-z0-9]|$)&#x27;,&#x27;i&#x27;);
   if(rx.test(text))candidates.push({skill,priority:3});
 });

 const dedup=new Map();
 candidates.forEach(x=&gt;{
   const key=x.skill.toLowerCase();

 });
 return [...dedup.values()]
   .filter(x=&gt;!resumeLower.includes(x.skill.toLowerCase()))
   .sort((x,y)=&gt;y.priority-x.priority)
   .map(x=&gt;x.skill)
   .slice(0,25);
}

async function downloadResumeDOCX(){
 const text=$(&#x27;optimizedResume&#x27;).value.trim();
 if(!text){alert(&#x27;Generate the resume first.&#x27;);return}
 if(typeof docx===&#x27;undefined&#x27;){
   alert(&#x27;DOCX generator is still loading. Please wait a moment and try again.&#x27;);
   return;
 }
 try{
   const {Document,Packer,Paragraph,TextRun,HeadingLevel}=docx;
   const paragraphs=[];
   text.split(/\r?\n/).forEach(line=&gt;{
     const t=line.trim();
     if(!t){paragraphs.push(new Paragraph({text:&#x27;&#x27;}));return}
     if(/^[A-Z][A-Z &amp;/+\-]{3,}$/.test(t)){
       paragraphs.push(new Paragraph({text:t,heading:HeadingLevel.HEADING_1}));
     }else if(/^[-•▪◦]\s*/.test(t)){
       paragraphs.push(new Paragraph({
         text:t.replace(/^[-•▪◦]\s*/,&#x27;&#x27;),
         bullet:{level:0}
       }));
     }else{
       paragraphs.push(new Paragraph({children:[new TextRun({text:t})]}));
     }
   });

   const docxDocument=new Document({
     sections:[{
       properties:{},
       children:paragraphs
     }]
   });

   const blob=await Packer.toBlob(docxDocument);
   const url=URL.createObjectURL(blob);
   const link=window.document.createElement(&#x27;a&#x27;);
   link.href=url;
   link.download=&#x27;Optimized_Resume.docx&#x27;;
   link.style.display=&#x27;none&#x27;;
   window.document.body.appendChild(link);
   link.click();
   setTimeout(()=&gt;{
     window.document.body.removeChild(link);
     URL.revokeObjectURL(url);
   },1500);
   $(&#x27;status&#x27;).style.display=&#x27;block&#x27;;
   $(&#x27;status&#x27;).textContent=&#x27;DOCX resume downloaded successfully.&#x27;;
 }catch(e){
   console.error(&#x27;DOCX download error:&#x27;,e);
   alert(&#x27;DOCX download failed: &#x27;+e.message);
 }
}

<script>
function showApp(which){
 const frames={
 hc:document.getElementById('hcFrame'),
 it:document.getElementById('itFrame'),
 rtr:document.getElementById('rtrFrame'),
 rai:document.getElementById('raiFrame')
 };
 const tabs={
 hc:document.getElementById('hcTab'),
 it:document.getElementById('itTab'),
 rtr:document.getElementById('rtrTab'),
 rai:document.getElementById('raiTab')
 };
 Object.keys(frames).forEach(k=>{
 frames[k].classList.toggle('hidden',k!==which);
 tabs[k].classList.toggle('active',k===which);
 });
 if(which==='rtr'){
 frames.rtr.style.height='1100px';
 }
 if(which==='rai'){
 frames.rai.style.height='1250px';
 }
 window.scrollTo({top:0,behavior:'smooth'});

window.addEventListener('message',e=>{
 if(!e.data || e.data.type!=='calcHeight') return;

 frames.forEach(f=>{if(f.contentWindow===e.source) f.style.height=(e.data.height+20)+'px';});
});
</script>
